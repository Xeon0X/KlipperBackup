[gcode_macro M109]
rename_existing: M99109
gcode:
    #Parameters
    {% set s = params.S|float %}
    
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  ; Set hotend temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}   ; Wait for hotend temp (within 1 degree)
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    #Parameters
    {% set s = params.S|float %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}   ; Set bed temp
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}  ; Wait for bed temp (within 1 degree)
    {% endif %}


[gcode_macro PRINT_START]
gcode:
  CLEAR_PAUSE
  BED_MESH_CLEAR
  
  SET_WLED_STATE STRIP=chamber PRESET=4
  SET_LED_EFFECT EFFECT=loading
  
  {% set BED = params.BED|default(60)|float %}
  {% set EXTRUDER = params.EXTRUDER|default(190)|float %}

  _CG28

  # CLEAN_NOZZLE
  # Z_TILT_ADJUST

  # BED_MESH_CALIBRATE
  # BED_MESH_PROFILE LOAD=default_hires

  Smart_Park

  M190 S{BED} ; heat to bed setting and WAIT
  M109 S{EXTRUDER} TO ; heat hotend to setting and WAIT

  SET_FAN_SPEED FAN=exhaust_fan SPEED=0.7

  SET_WLED_STATE STRIP=chamber PRESET=2
  SET_LED_EFFECT EFFECT=on
  LINE_PURGE
  

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-8.0 F3600                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107                                     ; turn off fan
    M117 7/7: Done!

    SET_FAN_SPEED FAN=exhaust_fan SPEED=0
    
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    SET_WLED_STATE STRIP=chamber PRESET=5
    SET_LED_EFFECT EFFECT=rainbow

    G4P10000 # wait 10s
    CLEAN_NOZZLE
    SET_WLED_STATE STRIP=chamber PRESET=2
    SET_LED_EFFECT EFFECT=on
    

[gcode_macro _CG28]
  gcode:
      SET_VELOCITY_LIMIT ACCEL=6300
      {% if "xyz" not in printer.toolhead.homed_axes %}
          G28
      {% endif %}

[firmware_retraction]
retract_length: 50
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 20
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 10
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

[gcode_macro CLEAN_NOZZLE]
variable_brush_top:             -2
variable_brush_start:           25
variable_brush_stop:           115
variable_clearance_z:           15	         ; When traveling, but not cleaning, the clearance along the z-axis between nozzle and brush.
variable_wipe_qty:              1	         ; Number of complete (A complete wipe: left, right, left OR right, left, right) wipes.
variable_prep_spd_xy:        7000	         ; Travel (not cleaning) speed along x and y-axis in mm/min.
variable_prep_spd_z:         1500	         ; Travel (not cleaning) speed along z axis in mm/min.
variable_wipe_spd_xy:        7000	         ; Nozzle wipe speed in mm/min.
gcode:
    _CG28

    ## Save the gcode state in this macro instance.
    SAVE_GCODE_STATE NAME=clean_nozzle
    
    ## Set to absolute positioning.
    G90
    
    ## Grab max position of Y-axis from config to use in setting a fixed y position for location_bucket_rear = True.
    {% set Ry = printer.configfile.config["stepper_y"]["position_max"]|float %}
    


    ## Position for wipe. Either left or right of brush based off bucket_pos to avoid unnecessary travel.
    G1 Z{brush_top + clearance_z} F{prep_spd_z}
    G1 X{brush_start} F{prep_spd_xy}
  
    G1 Y{Ry}
  
    ## Move nozzle down into brush.
    G1 Z{brush_top} F{prep_spd_z}
  
    ## Perform wipe. Wipe direction based off bucket_pos for cool random scrubby routine.
    {% for wipes in range(1, (wipe_qty + 1)) %}
       G1 X{brush_stop} Y{Ry} F{wipe_spd_xy}
       G1 X{brush_start} Y{Ry - 1.5} F{wipe_spd_xy}
       G1 X{brush_stop} Y{Ry - 1.5} F{wipe_spd_xy}
       G1 X{brush_start} Y{Ry} F{wipe_spd_xy}
    {% endfor %}
  
    ## Clear from area.
    M117 Cleaned!
    G1 Z{brush_top + clearance_z} F{prep_spd_z}
  
    ## Restore the gcode state to how it was before the macro.
    RESTORE_GCODE_STATE NAME=clean_nozzle

